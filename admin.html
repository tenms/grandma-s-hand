<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>할머니손 관리자</title>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body">
  <div class="admin-page">
    <header class="admin-header">
      <div>
        <h1>할머니손 관리자</h1>
        <p>프로필, 판매 상품, 체험, 관리자 전용 일정을 관리합니다.</p>
      </div>
      <a href="index.html">메인으로 돌아가기</a>
    </header>
    
    <section id="loginBox" class="admin-login">
      <h2>관리자 로그인</h2>
      <p>관리자 번호 4자리를 입력하면 수정 화면으로 들어갑니다.</p>
      <div class="login-row pin-login-row">
        <input id="adminPin" type="password" inputmode="numeric" maxlength="4" placeholder="관리자 번호 4자리">
        <button id="loginBtn" type="button">들어가기</button>
      </div>
    </section>

    <section id="adminPanel" class="admin-panel hidden">
      <div class="admin-status">
        <strong>관리자 모드</strong>
        <button id="logoutBtn" type="button">로그아웃</button>
      </div>

      <nav class="admin-tabs" aria-label="관리자 메뉴">
        <button class="tab-btn active" type="button" data-target="profileTab">프로필</button>
        <button class="tab-btn" type="button" data-target="productTab">판매 상품</button>
        <button class="tab-btn" type="button" data-target="experienceTab">체험</button>
        <button class="tab-btn" type="button" data-target="scheduleTab">일정</button>
        <button class="tab-btn" type="button" data-target="settingTab">설정</button>
      </nav>

      <section id="profileTab" class="admin-section active">
        <h2>메인 프로필 편집</h2>
        <div class="form-grid">
          <label>사이트 이름<input id="editSiteName" type="text"></label>
          <label>소개 문구<input id="editSubtitle" type="text"></label>
          <label>대표 이름<input id="editProfileName" type="text"></label>
          <label>전화번호<input id="editPhone" type="text"></label>
          <label class="full">주소<input id="editAddress" type="text"></label>
          <label class="full">프로필 한마디<input id="editQuote" type="text"></label>
          <label class="full">메인 설명<textarea id="editHeroDesc"></textarea></label>
          <label class="full">프로필 사진 선택
            <select id="editProfileImage">
              <option value="profile">기본 할머니 사진</option>
              <option value="farm">시골 배경 사진</option>
            </select>
          </label>
        </div>
        <button id="saveProfileBtn" class="save-btn" type="button">프로필 저장</button>
      </section>

      <section id="productTab" class="admin-section">
        <h2>판매 상품 편집</h2>
        <div class="form-grid">
          <label>상품명<input id="productName" type="text" placeholder="예: 햇감자"></label>
          <label>가격<input id="productPrice" type="text" placeholder="예: 10,000원"></label>
          <label>판매 출처
            <select id="productSource">
              <option value="할머니 직접 판매">할머니 직접 판매</option>
              <option value="우리 마을 판매">우리 마을 판매</option>
              <option value="이웃 어르신 판매">이웃 어르신 판매</option>
              <option value="지인 판매">지인 판매</option>
            </select>
          </label>
          <label>판매 상태
            <select id="productStatus">
              <option value="판매중">판매중</option>
              <option value="수량 적음">수량 적음</option>
              <option value="예약마감">예약마감</option>
              <option value="품절">품절</option>
            </select>
          </label>
          <label class="full">상품 대표 사진 선택
            <select id="productImageSelect">
              <option value="potato">감자 사진</option>
              <option value="gochujang">고추장 사진</option>
              <option value="doenjang">된장 사진</option>
              <option value="oil">참기름 사진</option>
              <option value="vegetable">채소 사진</option>
              <option value="defaultProduct">기본 장터 사진</option>
            </select>
          </label>
          <label class="full">설명<textarea id="productDesc" placeholder="상품 설명"></textarea></label>
        </div>
        <button id="addProductBtn" class="save-btn" type="button">상품 추가</button>
        <button id="cancelProductEditBtn" class="plain-cancel-btn hidden" type="button">상품 수정 취소</button>
        <div id="adminProductList" class="admin-list"></div>
      </section>

      <section id="experienceTab" class="admin-section">
        <h2>체험 편집</h2>
        <div class="form-grid">
          <label>체험명<input id="experienceTitle" type="text" placeholder="예: 장 만들기 체험"></label>
          <label>비용<input id="experiencePrice" type="text" placeholder="예: 1인 25,000원"></label>
          <label>소요 시간<input id="experienceTime" type="text" placeholder="예: 약 2시간"></label>
          <label>예약 상태
            <select id="experienceStatus">
              <option value="예약 가능">예약 가능</option>
              <option value="전화 문의">전화 문의</option>
              <option value="예약마감">예약마감</option>
            </select>
          </label>
          <label class="full">체험 대표 사진 선택
            <select id="experienceImageSelect">
              <option value="jang">장 만들기 사진</option>
              <option value="kimchi">김치 체험 사진</option>
              <option value="farmExperience">텃밭 체험 사진</option>
              <option value="defaultExperience">기본 체험 사진</option>
            </select>
          </label>
          <label class="full">설명<textarea id="experienceDesc" placeholder="체험 설명"></textarea></label>
        </div>
        <button id="addExperienceBtn" class="save-btn" type="button">체험 추가</button>
        <button id="cancelExperienceEditBtn" class="plain-cancel-btn hidden" type="button">체험 수정 취소</button>
        <div id="adminExperienceList" class="admin-list"></div>
      </section>

      <section id="scheduleTab" class="admin-section">
        <h2>관리자 전용 일정</h2>
        <p class="admin-note">이 일정은 관리자 페이지에만 표시되며, 고객용 메인 페이지에는 나오지 않습니다.</p>
        <div id="scheduleCalendar" class="schedule-calendar"></div>
        <div id="calendarDayDetail" class="calendar-day-detail">달력에서 일정이 있는 날짜를 누르면 자세한 내용이 보입니다.</div>
        <div class="form-grid">
          <label>날짜<input id="scheduleDate" type="date"></label>
          <label>구분
            <select id="scheduleType">
              <option value="상품 준비">상품 준비</option>
              <option value="체험 예약">체험 예약</option>
              <option value="방문 약속">방문 약속</option>
              <option value="개인 메모">개인 메모</option>
            </select>
          </label>
          <label class="full">내용<textarea id="scheduleMemo" placeholder="예: 박영희 어르신 고추장 5개 수령"></textarea></label>
        </div>
        <button id="addScheduleBtn" class="save-btn" type="button">일정 추가</button>
        <div id="adminScheduleList" class="schedule-list"></div>
      </section>

      <section id="settingTab" class="admin-section">
        <h2>관리자 설정</h2>
        <p class="admin-note">관리자 번호는 이 사이트에서 간단히 확인하고, Firebase에는 익명 로그인으로 연결합니다.</p>
        <div class="form-grid">
          <label>새 관리자 번호<input id="newAdminPin" type="password" inputmode="numeric" maxlength="4" placeholder="새 번호 4자리"></label>
          <label>관리자 번호 확인<input id="newAdminPinConfirm" type="password" inputmode="numeric" maxlength="4" placeholder="한 번 더 입력"></label>
        </div>
        <button id="changePinBtn" class="save-btn" type="button">관리자 번호 변경</button>
      </section>

      <button id="resetBtn" class="danger-btn" type="button">Firebase 더미 데이터로 초기화</button>
    </section>
  </div>

  <script type="module" src="js/admin.js"></script>
</body>
</html>
